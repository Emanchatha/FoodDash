<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-6">
                <img class="img-fluid login-img" src="assets/images/login_img.png" alt="">
            </div>
            <div class="col-6">
                <div>
                    <div class="login-text">Login to your account!</div>
                    <div class="icon-link box">
                        <a href="https://www.google.com/">
                            <img src="assets/images/google.png" alt=""> <span>Login with google</span> </a>
                        <a href="https://www.facebook.com/">
                            <img src="assets/images/facebook.png" alt=""><span>Login with facebook</span> </a>
                    </div>
                    <div>
                        <label for="email">Email Address</label>
                        <input id="email" type="email" placeholder="Enter your Email" required>
                    </div>
                    <div>
                        <label for="password">Password</label>
                        <input id="password" type="password" placeholder="Enter your Password" required>
                    </div>
                    <button class="btn btn-primary rounded-pill">Login to Continue</button>
                    <div>
                        Don't have an account?<span><a href="">Sign up</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>
</body>

</html>
